version: '3.8'

services:
  addon:
    build:
      context: .
      dockerfile: Dockerfile
    image: iranian-satellite-stremio-addon:latest
    container_name: stremio-persian-addon
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - M3U_URLS=https://iptv-org.github.io/iptv/languages/fas.m3u
      - EPG_URLS=
      - CUSTOM_CHANNELS=
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stremio-persian-addon-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
